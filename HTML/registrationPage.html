<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="Style1.css">
        <meta charset="utf-8">
        <title>REGISTRATION PAGE</title>
    </head>
    <body>
        <div class="form-container">
          <form action="Register Now" method="POST">
            <h1>Registration Form</h1><br>
            <label for="fname">First name:</label><br>
            <input type="text" id="fname" name="fname" placeholder="Louis" required><br>

            <label for="name">Last name:</label><br>
            <input type="text" id="name" name="name" placeholder="Egebe" required><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="abcdef@gmail.com" required><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone" placeholder="672862777" pattern="[6]{1}-[0-9]{8}"><br>

            <button type="button" onclick="saveData()">Register Now</button>
            
          </form>
        </div>
        <script src="javascript1.js"></script>
    </body>

</html>
